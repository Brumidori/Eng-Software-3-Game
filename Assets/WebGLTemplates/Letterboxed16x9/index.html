<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{{ PRODUCT_NAME }}}</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="page-shell">
      <div class="letterbox-frame" id="unity-frame">
        <div class="unity-container" id="unity-container">
          <canvas id="unity-canvas" width="{{{ WIDTH }}}" height="{{{ HEIGHT }}}" tabindex="-1"></canvas>
          <div id="unity-loading-bar">
            <div id="unity-logo"></div>
            <div id="unity-progress-container">
              <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/{{{ LOADER_FILENAME }}}";
      var config = {
        dataUrl: buildUrl + "/{{{ DATA_FILENAME }}}",
        frameworkUrl: buildUrl + "/{{{ FRAMEWORK_FILENAME }}}",
        codeUrl: buildUrl + "/{{{ CODE_FILENAME }}}",
#if MEMORY_FILENAME
        memoryUrl: buildUrl + "/{{{ MEMORY_FILENAME }}}",
#endif
#if SYMBOLS_FILENAME
        symbolsUrl: buildUrl + "/{{{ SYMBOLS_FILENAME }}}",
#endif
        streamingAssetsUrl: "StreamingAssets",
        companyName: "{{{ COMPANY_NAME }}}",
        productName: "{{{ PRODUCT_NAME }}}",
        productVersion: "{{{ PRODUCT_VERSION }}}",
        matchWebGLToCanvasSize: true,
        devicePixelRatio: window.devicePixelRatio || 1
      };

      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var frame = document.querySelector("#unity-frame");
      var unityInstance = null;

      function resizeFrame() {
        var viewportWidth = window.innerWidth;
        var viewportHeight = window.innerHeight;
        var targetWidth = viewportHeight * 16 / 9;
        var targetHeight = viewportWidth * 9 / 16;

        if (targetWidth <= viewportWidth) {
          frame.style.width = targetWidth + "px";
          frame.style.height = viewportHeight + "px";
        } else {
          frame.style.width = viewportWidth + "px";
          frame.style.height = targetHeight + "px";
        }
      }

      window.addEventListener("resize", resizeFrame);
      window.addEventListener("orientationchange", resizeFrame);
      resizeFrame();

      function resizeUnityCanvasToContainer() {
        try {
          var frameElem = document.querySelector("#unity-frame");
          var canvasElem = document.querySelector("#unity-canvas") || (typeof Module !== 'undefined' && Module.canvas);
          if (!frameElem || !canvasElem) return;
          var rect = frameElem.getBoundingClientRect();
          var w = Math.max(1, Math.round(rect.width));
          var h = Math.max(1, Math.round(rect.height));
          canvasElem.style.width = w + 'px';
          canvasElem.style.height = h + 'px';
          var dpr = window.devicePixelRatio || 1;
          if (canvasElem.width !== Math.round(w * dpr) || canvasElem.height !== Math.round(h * dpr)) {
            canvasElem.width = Math.round(w * dpr);
            canvasElem.height = Math.round(h * dpr);
          }
        } catch (e) {
          console.warn('resizeUnityCanvasToContainer error', e);
        }
      }

      window.addEventListener('resize', resizeUnityCanvasToContainer);
      window.addEventListener('orientationchange', resizeUnityCanvasToContainer);
      window.addEventListener('load', function () { setTimeout(resizeUnityCanvasToContainer, 50); setTimeout(resizeUnityCanvasToContainer, 300); });

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = function () {
        createUnityInstance(canvas, config, function (progress) {
          progressBarFull.style.width = Math.round(progress * 100) + "%";
          if (progress >= 1) {
            loadingBar.style.display = "none";
          }
        }).then(function (instance) {
          unityInstance = instance;
          // Ensure canvas buffer matches visible size after Unity initializes
          setTimeout(resizeUnityCanvasToContainer, 50);
          setTimeout(resizeUnityCanvasToContainer, 300);
        }).catch(function (message) {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
